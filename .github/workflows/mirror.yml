name: Mirror to Backup Repo (DEBUG MODE)

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== TEMPORARY DEBUG STEPS (REMOVE AFTER TESTING) ==========
      - name: 🔐 VERIFY SECRET EXISTENCE
        run: |
          echo "✅ Secret exists? ${{ secrets.TARGET_REPO_TOKEN != '' }}"
          echo "🔍 Target URL format: https://salz808:***@github.com/salz808/Amen_Pray_App-017.git"
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}  # Required for masking

      - name: 🌐 VERIFY REMOTE CONFIGURATION
        run: |
          git remote -v
          echo "💡 If target remote is missing, we'll add it in next step"
      # ========== END DEBUG STEPS ==========
      
      - name: 🔄 Mirror to target repo
        env:
          TARGET_REPO: "https://salz808:${{ secrets.TARGET_REPO_TOKEN }}@github.com/salz808/Amen_Pray_App-017.git"
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add target $TARGET_REPO || echo "Target remote already exists"
          git push --mirror target
