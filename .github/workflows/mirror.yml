name: Mirror to Backup Repo

on:
  push:
    branches: [main]  # Adjust branches as needed

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for mirroring

      - name: Mirror to target repo
        env:
          TARGET_REPO: "https://salz808:${{ secrets.TARGET_REPO_TOKEN }}@github.com/salz808/Amen_Pray_App-017.git"
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add target $TARGET_REPO
          git push --mirror target
