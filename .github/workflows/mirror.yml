name: Mirror to Backup Repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

          # ADD THIS DEBUG STEP (TEMPORARY!)
- name: 🔍 Verify secret (DEBUG - REMOVE AFTER TESTING)
  run: |
    echo "Secret exists? ${{ secrets.TARGET_REPO_TOKEN != '' }}"
    echo "Target URL: https://salz808:***@github.com/salz808/Amen_Pray_App-017.git"
  env:
    TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}  # Required for masking

      - name: Mirror to target repo
        env:
          TARGET_REPO: "https://salz808:${{ secrets.TARGET_REPO_TOKEN }}@github.com/salz808/Amen_Pray_App-017.git"
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add target $TARGET_REPO
          git push --mirror target
