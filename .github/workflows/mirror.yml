name: Mirror to Backup Repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify remote URL (DEBUG - keep for safety)
        run: |
          echo "⚠️ Target URL: $TARGET_REPO"  # Will show as *** in logs
          git remote -v

      - name: Mirror to target repo
        env:
          TARGET_REPO: "https://salz808:${{ secrets.TARGET_REPO_TOKEN }}@github.com/salz808/Amen_Pray_App-017.git"
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add target $TARGET_REPO || echo "Target remote already exists"
          git push --mirror target
